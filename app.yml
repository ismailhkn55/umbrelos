tagline: Otomatik kripto trading botu ve web arayüzü
description: >-
  Freqtrade, açık kaynaklı ve güçlü bir kripto alım-satım botudur.
  Strateji tabanlı otomatik trading yapmanı sağlar.
features:
  - Açık kaynak ve tamamen ücretsizdir.
  - Kendi trading botunu kontrol et ve özelleştir.
  - Docker ile hızlı kurulum.
  - Dakikalar içinde çalışır hale gelir.
  - Web arayüzü ile kolay kullanım.
  - Strateji desteği (Python).
  - Backtesting ve analiz araçları.
  - Binance, Bybit gibi borsalarla uyumlu.
releaseNotes: >-
  Bu sürüm Freqtrade stable versiyonunu içerir.
